<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ganate una Camiseta de Antique Patagonia</title>
<meta property="og:title" content="Ganate una Camiseta de Antique Patagonia 🇦🇷">
<meta property="og:description" content="11 camisetas, 11 desafíos. ¿Conocés tu selección?">
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@400;500&display=swap');

:root {
  --celeste: #74ACDF;
  --blanco: #FFFFFF;
  --negro: #0a0a0a;
  --oro: #F0C040;
  --rojo: #C8102E;
  --verde-ok: #00C851;
  --gris-oscuro: #1a1a2e;
  --gris-medio: #2a2a4a;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--gris-oscuro);
  color: var(--blanco);
  font-family: 'Barlow', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── FONDO ANIMADO ── */
.bg-field {
  position: fixed; inset: 0; z-index: 0;
  background: 
    repeating-linear-gradient(90deg, rgba(116,172,223,.04) 0px, rgba(116,172,223,.04) 1px, transparent 1px, transparent 80px),
    repeating-linear-gradient(0deg, rgba(116,172,223,.04) 0px, rgba(116,172,223,.04) 1px, transparent 1px, transparent 80px),
    radial-gradient(ellipse at 50% 0%, rgba(116,172,223,.15) 0%, transparent 60%),
    var(--gris-oscuro);
  animation: fieldPulse 8s ease-in-out infinite;
}
@keyframes fieldPulse {
  0%,100% { opacity: 1; }
  50% { opacity: .7; }
}

/* ── LAYOUT ── */
.container {
  position: relative; z-index: 1;
  max-width: 480px; margin: 0 auto;
  padding: 0 20px 40px;
  min-height: 100vh;
  display: flex; flex-direction: column; align-items: center;
}

/* ── HEADER ── */
.header {
  width: 100%; text-align: center;
  padding: 32px 0 24px;
  border-bottom: 1px solid rgba(116,172,223,.2);
  margin-bottom: 28px;
}
.header-brand {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 13px; letter-spacing: 4px;
  color: var(--celeste); opacity: .7;
  margin-bottom: 8px;
}
.header-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(28px, 8vw, 42px);
  line-height: 1; letter-spacing: 2px;
  color: var(--blanco);
}
.header-title span { color: var(--celeste); }
.header-sub {
  margin-top: 10px;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 14px; letter-spacing: 1px;
  color: rgba(255,255,255,.5);
}
.countdown-bar {
  margin-top: 16px;
  display: inline-flex; align-items: center; gap: 8px;
  background: rgba(240,192,64,.1);
  border: 1px solid rgba(240,192,64,.3);
  border-radius: 20px; padding: 6px 16px;
}
.countdown-bar span { font-family: 'Bebas Neue', sans-serif; font-size: 15px; color: var(--oro); }
.countdown-bar small { font-size: 11px; color: rgba(240,192,64,.6); letter-spacing: 1px; }

/* ── SELECTOR DE JUGADOR ── */
.section-label {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 11px; letter-spacing: 3px; color: rgba(255,255,255,.4);
  margin-bottom: 14px; text-transform: uppercase;
  width: 100%;
}
.players-grid {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 8px; width: 100%; margin-bottom: 28px;
}
.player-btn {
  background: var(--gris-medio);
  border: 1px solid rgba(116,172,223,.2);
  border-radius: 10px; padding: 10px 6px;
  cursor: pointer; transition: all .2s;
  text-align: center;
  position: relative; overflow: hidden;
}
.player-btn:hover { border-color: var(--celeste); transform: translateY(-2px); }
.player-btn.active { border-color: var(--celeste); background: rgba(116,172,223,.15); }
.player-btn.won { border-color: var(--oro); background: rgba(240,192,64,.1); }
.player-btn.won::after {
  content: '✓'; position: absolute; top: 4px; right: 6px;
  font-size: 10px; color: var(--oro);
}
.player-num {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 22px; color: var(--celeste); line-height: 1;
}
.player-name {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 10px; color: rgba(255,255,255,.6);
  margin-top: 2px; line-height: 1.2;
}

/* ── ARENA DE JUEGO ── */
.game-arena {
  width: 100%;
  background: rgba(255,255,255,.03);
  border: 1px solid rgba(116,172,223,.15);
  border-radius: 20px;
  padding: 28px 24px;
  display: none;
}
.game-arena.active { display: block; }

.player-header {
  display: flex; align-items: center; gap: 16px;
  margin-bottom: 24px; padding-bottom: 20px;
  border-bottom: 1px solid rgba(255,255,255,.08);
}
.jersey-icon {
  width: 56px; height: 56px;
  background: linear-gradient(135deg, var(--celeste) 0%, rgba(116,172,223,.5) 100%);
  border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 22px; color: var(--negro);
  flex-shrink: 0;
}
.player-info-name {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 24px; line-height: 1;
}
.player-info-pos {
  font-size: 12px; color: rgba(255,255,255,.4);
  font-family: 'Barlow Condensed', sans-serif;
  letter-spacing: 1px; margin-top: 2px;
}

/* ── PROGRESO ── */
.progress-row {
  display: flex; gap: 4px; margin-bottom: 24px;
}
.prog-dot {
  flex: 1; height: 4px; border-radius: 2px;
  background: rgba(255,255,255,.1);
  transition: background .3s;
}
.prog-dot.done { background: var(--celeste); }
.prog-dot.fail { background: var(--rojo); }
.prog-dot.current { background: var(--oro); animation: blink 1s ease-in-out infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.4} }

/* ── NIVEL LABEL ── */
.level-label {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 11px; letter-spacing: 2px; color: rgba(255,255,255,.35);
  margin-bottom: 8px;
}
.level-zone {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 13px; letter-spacing: 2px;
  margin-bottom: 16px;
}
.level-zone.exterior { color: rgba(116,172,223,.6); }
.level-zone.interior { color: rgba(240,192,64,.8); }
.level-zone.premio { color: var(--verde-ok); }

/* ── QR ANIMADO ── */
.qr-wrapper {
  display: flex; justify-content: center;
  margin-bottom: 24px;
  perspective: 600px;
}
.qr-cube {
  width: 140px; height: 140px;
  position: relative;
  transform-style: preserve-3d;
  animation: rotar 6s linear infinite;
}
@keyframes rotar {
  0%   { transform: rotateY(0deg) rotateX(10deg); }
  100% { transform: rotateY(360deg) rotateX(10deg); }
}
.qr-cube.paused { animation-play-state: paused; }
.qr-face {
  position: absolute; inset: 0;
  border: 2px solid var(--celeste);
  background: rgba(116,172,223,.06);
  display: flex; align-items: center; justify-content: center;
  font-size: 10px;
  backface-visibility: visible;
}
.qr-face svg { width: 80px; height: 80px; opacity: .6; }
.qr-face.front  { transform: translateZ(70px); }
.qr-face.back   { transform: translateZ(-70px) rotateY(180deg); }
.qr-face.left   { transform: translateX(-70px) rotateY(-90deg); }
.qr-face.right  { transform: translateX(70px) rotateY(90deg); }
.qr-face.top    { transform: translateY(-70px) rotateX(90deg); }
.qr-face.bottom { transform: translateY(70px) rotateX(-90deg); }

/* ── INPUT DE RESPUESTA ── */
.input-zone { margin-bottom: 16px; }
.input-label {
  font-size: 12px; color: rgba(255,255,255,.4);
  font-family: 'Barlow Condensed', sans-serif;
  letter-spacing: 1px; margin-bottom: 8px;
}
.answer-input {
  width: 100%;
  background: rgba(255,255,255,.06);
  border: 1px solid rgba(116,172,223,.3);
  border-radius: 10px;
  padding: 14px 16px;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 20px; letter-spacing: 3px;
  color: var(--blanco);
  text-align: center;
  outline: none;
  transition: border-color .2s;
  text-transform: uppercase;
}
.answer-input:focus { border-color: var(--celeste); }
.answer-input.shake {
  animation: shake .4s ease;
  border-color: var(--rojo);
}
@keyframes shake {
  0%,100%{transform:translateX(0)}
  20%{transform:translateX(-8px)}
  40%{transform:translateX(8px)}
  60%{transform:translateX(-5px)}
  80%{transform:translateX(5px)}
}
.answer-input.correct { border-color: var(--verde-ok); }

/* ── PISTA ── */
.hint-box {
  background: rgba(116,172,223,.07);
  border: 1px solid rgba(116,172,223,.15);
  border-radius: 10px; padding: 14px 16px;
  margin-bottom: 16px;
}
.hint-box p {
  font-size: 14px; line-height: 1.6;
  color: rgba(255,255,255,.75);
}
.hint-box .hint-tag {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 10px; letter-spacing: 2px;
  color: var(--celeste); opacity: .6;
  margin-bottom: 6px;
}

/* ── MENSAJE NARRATIVO ── */
.narrative-msg {
  text-align: center;
  padding: 20px;
  border-radius: 12px;
  margin-bottom: 16px;
  display: none;
}
.narrative-msg.show { display: block; }
.narrative-msg.fail-msg {
  background: rgba(200,16,46,.1);
  border: 1px solid rgba(200,16,46,.3);
}
.narrative-msg.ok-msg {
  background: rgba(0,200,81,.1);
  border: 1px solid rgba(0,200,81,.3);
}
.narrative-msg.win-msg {
  background: rgba(240,192,64,.12);
  border: 1px solid rgba(240,192,64,.4);
}
.narrative-emoji { font-size: 32px; margin-bottom: 8px; }
.narrative-text {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 17px; line-height: 1.4;
  font-weight: 600;
}
.narrative-text.fail-msg { color: rgba(200,16,46,.9); }
.narrative-text.ok-msg { color: rgba(0,200,81,.9); }
.narrative-text.win-msg { color: var(--oro); }

/* ── BOTÓN SUBMIT ── */
.btn-submit {
  width: 100%;
  background: var(--celeste);
  border: none; border-radius: 10px;
  padding: 15px;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 18px; letter-spacing: 3px;
  color: var(--negro);
  cursor: pointer;
  transition: all .2s;
  margin-bottom: 12px;
}
.btn-submit:hover { background: var(--blanco); transform: translateY(-1px); }
.btn-submit:active { transform: scale(.98); }
.btn-submit:disabled { opacity: .4; cursor: not-allowed; transform: none; }

/* ── REGISTRO GANADOR ── */
.winner-form {
  display: none;
  flex-direction: column; gap: 12px;
}
.winner-form.show { display: flex; }
.winner-form input {
  width: 100%;
  background: rgba(255,255,255,.06);
  border: 1px solid rgba(240,192,64,.4);
  border-radius: 10px; padding: 13px 16px;
  font-family: 'Barlow', sans-serif;
  font-size: 15px; color: var(--blanco);
  outline: none;
}
.winner-form input::placeholder { color: rgba(255,255,255,.3); }
.winner-form input:focus { border-color: var(--oro); }
.btn-registrar {
  width: 100%;
  background: var(--oro);
  border: none; border-radius: 10px;
  padding: 15px;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 18px; letter-spacing: 3px;
  color: var(--negro); cursor: pointer;
  transition: all .2s;
}
.btn-registrar:hover { background: var(--blanco); }

/* ── TABLERO PÚBLICO ── */
.leaderboard {
  width: 100%; margin-top: 32px;
}
.lb-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 18px; letter-spacing: 2px;
  color: var(--celeste); margin-bottom: 12px;
}
.lb-empty {
  font-size: 13px; color: rgba(255,255,255,.3);
  font-style: italic; text-align: center; padding: 20px 0;
}
.lb-item {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 14px;
  background: rgba(255,255,255,.03);
  border: 1px solid rgba(116,172,223,.1);
  border-radius: 8px; margin-bottom: 6px;
}
.lb-jersey {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 14px; color: var(--celeste);
  min-width: 28px;
}
.lb-user { flex: 1; font-size: 13px; }
.lb-city { font-size: 11px; color: rgba(255,255,255,.4); }
.lb-time { font-size: 11px; color: rgba(255,255,255,.3); font-family: 'Barlow Condensed', sans-serif; }

/* ── TOAST ── */
.toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
  background: var(--gris-medio);
  border: 1px solid rgba(116,172,223,.3);
  border-radius: 20px; padding: 10px 20px;
  font-size: 13px; color: var(--blanco);
  z-index: 999; opacity: 0;
  transition: opacity .3s;
  white-space: nowrap;
}
.toast.show { opacity: 1; }

/* ── CONFETTI ── */
.confetti-piece {
  position: fixed; top: -10px;
  width: 8px; height: 8px;
  animation: fall linear forwards;
  z-index: 999;
  border-radius: 2px;
}
@keyframes fall {
  to { transform: translateY(110vh) rotate(720deg); opacity: 0; }
}
</style>
</head>
<body>

<div class="bg-field"></div>

<div class="container">

  <!-- HEADER -->

      { hint: 'Posición de Álvarez en la cancha', answer: 'DELANTERO', zone: 'interior', msg: ['ya estás mano a mano con el arco 🏟️','la araña se hizo a un lado, el gol es tuyo ⚽'] },
      { hint: '¿Cuál es el apellido de Julián?', answer: 'ALVAREZ', zone: 'premio', msg: [] }
    ]
  }
];

// ══════════════════════════════════════════
// ESTADO DEL JUEGO
// ══════════════════════════════════════════
let currentPlayer = null;
let currentLevel = 0;
let playerProgress = {}; // { playerIndex: { level, done, won } }
let waitingForWinner = false;

// Mensajes por zona (fallback)
const ZONE_MSGS = {
  exterior: [
    { emoji: '⚽', text: 'Seguís participando, pero todavía estás afuera del QR.' },
    { emoji: '🥅', text: 'Estuviste cerca... pero el travesaño te negó el gol.' },
    { emoji: '🧤', text: 'El arquero te la sacó. Seguí intentando.' },
    { emoji: '📺', text: 'El VAR te anuló. Pero podés seguir probando.' },
    { emoji: '🏃', text: 'Si te arrepentís no llegarás. ¡Dale!' },
    { emoji: '🎯', text: 'Muy cerca. La pelota rozó el poste.' }
  ],
  interior: [
    { emoji: '🔥', text: 'Ya estás adentro del QR. El premio se siente.' },
    { emoji: '💫', text: 'Las caras internas te hablan. Escuchalas.' },
    { emoji: '⚡', text: 'Un paso más y la camiseta es tuya.' }
  ]
};

// ══════════════════════════════════════════
// COUNTDOWN AL MUNDIAL
// ══════════════════════════════════════════
function updateCountdown() {
  const mundial = new Date('2026-06-11T00:00:00');
  const now = new Date();
  const diff = Math.floor((mundial - now) / (1000 * 60 * 60 * 24));
  document.getElementById('countdown-days').textContent = diff > 0 ? diff : '0';
}
updateCountdown();
setInterval(updateCountdown, 60000);

// ══════════════════════════════════════════
// RENDERIZAR JUGADORES
// ══════════════════════════════════════════
function renderPlayers() {
  const grid = document.getElementById('playersGrid');
  grid.innerHTML = '';
  PLAYERS.forEach((p, i) => {
    const prog = playerProgress[i] || { level: 0, done: false, won: false };
    const btn = document.createElement('div');
    btn.className = 'player-btn' + (currentPlayer === i ? ' active' : '') + (prog.won ? ' won' : '');
    btn.onclick = () => selectPlayer(i);
    btn.innerHTML = `<div class="player-num">${p.num}</div><div class="player-name">${p.apodo}</div>`;
    grid.appendChild(btn);
  });
}

// ══════════════════════════════════════════
// SELECCIONAR JUGADOR
// ══════════════════════════════════════════
function selectPlayer(idx) {
  currentPlayer = idx;
  const p = PLAYERS[idx];
  if (!playerProgress[idx]) playerProgress[idx] = { level: 0, done: false, won: false };
  currentLevel = playerProgress[idx].level;
  waitingForWinner = false;

  document.getElementById('jerseyIcon').textContent = p.num;
  document.getElementById('playerName').textContent = p.name;
  document.getElementById('playerPos').textContent = p.pos;
  document.getElementById('gameArena').classList.add('active');
  document.getElementById('winnerForm').classList.remove('show');
  document.getElementById('narrativeMsg').classList.remove('show');
  document.getElementById('answerInput').value = '';
  document.getElementById('answerInput').className = 'answer-input';
  document.getElementById('btnSubmit').disabled = false;
  document.getElementById('qrCube').classList.remove('paused');

  renderPlayers();
  renderProgress();
  renderLevel();
}

// ══════════════════════════════════════════
// PROGRESO VISUAL
// ══════════════════════════════════════════
function renderProgress() {
  const row = document.getElementById('progressRow');
  row.innerHTML = '';
  const p = PLAYERS[currentPlayer];
  const prog = playerProgress[currentPlayer];
  p.levels.forEach((_, i) => {
    const dot = document.createElement('div');
    dot.className = 'prog-dot';
    if (i < prog.level) dot.classList.add('done');
    else if (i === prog.level && !prog.won) dot.classList.add('current');
    row.appendChild(dot);
  });
}

// ══════════════════════════════════════════
// RENDERIZAR NIVEL ACTUAL
// ══════════════════════════════════════════
function renderLevel() {
  const p = PLAYERS[currentPlayer];
  const prog = playerProgress[currentPlayer];

  if (prog.won) {
    document.getElementById('levelZone').textContent = '🏆 PREMIO GANADO';
    document.getElementById('levelZone').className = 'level-zone premio';
    document.getElementById('hintText').textContent = '¡Felicitaciones! Ya registraste tu premio.';
    document.getElementById('btnSubmit').disabled = true;
    document.getElementById('qrCube').classList.add('paused');
    return;
  }

  const lvl = p.levels[prog.level];
  if (!lvl) return;

  const zoneLabels = { exterior: 'CARA EXTERIOR ' + (prog.level + 1), interior: 'CARA INTERIOR ' + (prog.level - 5), premio: '⭐ NIVEL FINAL — PREMIO' };
  document.getElementById('levelZone').textContent = zoneLabels[lvl.zone] || '';
  document.getElementById('levelZone').className = 'level-zone ' + lvl.zone;
  document.getElementById('hintText').textContent = lvl.hint;
  document.getElementById('answerInput').focus();
}

// ══════════════════════════════════════════
// VERIFICAR RESPUESTA
// ══════════════════════════════════════════
function checkAnswer() {
  if (currentPlayer === null) return;
  const input = document.getElementById('answerInput');
  const val = input.value.trim().toUpperCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
  if (!val) return;

  const p = PLAYERS[currentPlayer];
  const prog = playerProgress[currentPlayer];
  const lvl = p.levels[prog.level];
  const correctRaw = lvl.answer.toUpperCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');

  if (val === correctRaw) {
    // CORRECTO
    input.className = 'answer-input correct';
    const isLast = prog.level === p.levels.length - 1;

    if (isLast) {
      // GANADOR
      prog.won = true;
      prog.level = p.levels.length;
      playerProgress[currentPlayer] = prog;
      document.getElementById('qrCube').classList.add('paused');
      showNarrative('win', '🏆', '¡¡CAMPEÓN!! La camiseta de ' + p.name + ' es tuya. Completá tus datos para reclamarla.');
      document.getElementById('btnSubmit').disabled = true;
      document.getElementById('winnerForm').classList.add('show');
      waitingForWinner = true;
      launchConfetti();
    } else {
      const msgs = lvl.msg && lvl.msg.length > 0 ? lvl.msg : ['¡Correcto! Seguís avanzando 🎯'];
      showNarrative('ok', '✅', msgs[Math.floor(Math.random() * msgs.length)]);
      prog.level++;
      playerProgress[currentPlayer] = prog;
      currentLevel = prog.level;
      setTimeout(() => {
        input.value = '';
        input.className = 'answer-input';
        document.getElementById('narrativeMsg').classList.remove('show');
        renderProgress();
        renderLevel();
      }, 2200);
    }
    renderProgress();
    renderPlayers();

  } else {
    // ERROR
    input.classList.add('shake');
    setTimeout(() => { input.classList.remove('shake'); input.className = 'answer-input'; }, 500);

    const zone = lvl.zone;
    const pool = lvl.msg && lvl.msg.length > 0 ? lvl.msg : ZONE_MSGS[zone] || ZONE_MSGS.exterior;
    const pick = pool[Math.floor(Math.random() * pool.length)];
    const emoji = typeof pick === 'object' ? pick.emoji : '⚽';
    const text = typeof pick === 'object' ? pick.text : pick;
    showNarrative('fail', emoji, text);
    setTimeout(() => { document.getElementById('narrativeMsg').classList.remove('show'); }, 3000);
  }
}

function showNarrative(type, emoji, text) {
  const box = document.getElementById('narrativeMsg');
  const em = document.getElementById('narrativeEmoji');
  const tx = document.getElementById('narrativeText');
  box.className = 'narrative-msg show ' + (type === 'win' ? 'win-msg' : type === 'ok' ? 'ok-msg' : 'fail-msg');
  em.textContent = emoji;
  tx.textContent = text;
  tx.className = 'narrative-text ' + (type === 'win' ? 'win-msg' : type === 'ok' ? 'ok-msg' : 'fail-msg');
}

// ══════════════════════════════════════════
// REGISTRAR GANADOR EN GOOGLE SHEETS
// ══════════════════════════════════════════
async function registerWinner() {
  const name = document.getElementById('wName').value.trim();
  const email = document.getElementById('wEmail').value.trim();
  const city = document.getElementById('wCity').value.trim();
  if (!name || !email || !city) { showToast('Completá todos los campos 👆'); return; }

  const p = PLAYERS[currentPlayer];
  const emailMasked = email.substring(0, 3) + '***' + email.slice(email.indexOf('@'));

  const payload = {
    timestamp: new Date().toISOString(),
    nombre: name,
    ciudad: city,
    email: email,
    emailPublico: emailMasked,
    qrNumero: p.num,
    jugador: p.name,
    gano: 'SI'
  };

  try {
    showToast('Registrando tu premio... ⏳');
    const res = await fetch(SHEET_WEBAPP_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    document.getElementById('winnerForm').classList.remove('show');
    showToast('🏆 ¡Registrado! Antique Patagonia te va a contactar pronto.');
    renderLeaderboard([payload]);
  } catch (e) {
    showToast('Error al registrar. Intentá de nuevo.');
  }
}

// ══════════════════════════════════════════
// TABLERO PÚBLICO
// ══════════════════════════════════════════
function renderLeaderboard(extra = []) {
  const list = document.getElementById('lbList');
  if (extra.length === 0) {
    list.innerHTML = '<div class="lb-empty">Todavía no hay ganadores. ¡Sé el primero!</div>';
    return;
  }
  list.innerHTML = extra.map(w => `
    <div class="lb-item">
      <div class="lb-jersey">#${w.qrNumero}</div>
      <div class="lb-user">
        <div>${w.emailPublico}</div>
        <div class="lb-city">${w.ciudad}</div>
      </div>
      <div class="lb-time">${w.jugador}</div>
    </div>
  `).join('');
}

async function loadLeaderboard() {
  if (!SHEET_WEBAPP_URL || SHEET_WEBAPP_URL.includes('TU_URL')) return;
  try {
    const res = await fetch(SHEET_WEBAPP_URL + '?action=winners');
    const data = await res.json();
    if (data && data.length > 0) renderLeaderboard(data);
  } catch (e) {}
}
loadLeaderboard();

// ══════════════════════════════════════════
// CONFETTI
// ══════════════════════════════════════════
function launchConfetti() {
  const colors = ['#74ACDF', '#FFFFFF', '#F0C040', '#C8102E'];
  for (let i = 0; i < 60; i++) {
    setTimeout(() => {
      const el = document.createElement('div');
      el.className = 'confetti-piece';
      el.style.left = Math.random() * 100 + 'vw';
      el.style.background = colors[Math.floor(Math.random() * colors.length)];
      el.style.animationDuration = (1.5 + Math.random() * 2) + 's';
      el.style.animationDelay = Math.random() * .5 + 's';
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 4000);
    }, i * 40);
  }
}

// ══════════════════════════════════════════
// TOAST
// ══════════════════════════════════════════
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// ENTER para confirmar
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && currentPlayer !== null && !waitingForWinner) checkAnswer();
});

// INIT
renderPlayers();
</script>
</body>
</html>
